# =============================================================
# WORKFLOW DE CI - TravelTech Multicloud
# =============================================================
# Diagrama d'execució:
#
#  INICI (push / pull_request a main)
#       │
#       ▼
#  ┌─────────────────────┐
#  │  Checkout del codi  │
#  └─────────┬───────────┘
#            │
#       ▼
#  ┌─────────────────────┐
#  │  Configurar Node.js │
#  └─────────┬───────────┘
#            │
#       ▼
#  ┌──────────────────────────┐
#  │  Instal·lar dependències │
#  └─────────┬────────────────┘
#            │
#       ▼
#  ┌──────────────────────┐
#  │  Verificar sintaxi   │  ──── ERROR ──► Notificar fallida ──► FI ❌
#  │    (npm run build)   │
#  └─────────┬────────────┘
#            │ OK
#       ▼
#  ┌──────────────────────┐
#  │  Qualitat del codi   │  ──── ERROR ──► Notificar fallida ──► FI ❌
#  │    (npm run lint)    │
#  └─────────┬────────────┘
#            │ OK
#       ▼
#  ┌──────────────────────┐
#  │   Executar tests     │  ──── ERROR ──► Notificar fallida ──► FI ❌
#  │    (npm test)        │
#  └─────────┬────────────┘
#            │ OK
#       ▼
#     FI ✅
#
# Els 3 jobs (favorites, wishlist, history) s'executen en paral·lel.
# Si qualsevol pas falla, el workflow s'atura automàticament.
# =============================================================

name: Tests

on:
  # S'executa en cada push o pull request a la branca principal
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-favorites:
    name: Tests service-favorites
    runs-on: ubuntu-latest
    steps:
      # Descarrega el codi del repositori a l'agent de CI
      - uses: actions/checkout@v4

      # Configura la versió de Node.js i activa la caché de npm
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: service-favorites/package-lock.json

      # Instal·la totes les dependències del servei
      - name: Instal·lar dependències
        run: npm install
        working-directory: service-favorites

      # Verifica que la sintaxi JavaScript és vàlida (node --check)
      # Si hi ha errors de sintaxi, el workflow s'atura aquí
      - name: Verificar sintaxi (build)
        run: npm run build
        working-directory: service-favorites

      # Analitza el codi amb ESLint per detectar problemes de qualitat
      # Si hi ha errors de lint, el workflow s'atura aquí
      - name: Comprovar qualitat del codi (lint)
        run: npm run lint
        working-directory: service-favorites

      # Executa els tests automàtics amb Jest
      # Si algun test falla, el workflow s'atura aquí
      - name: Executar tests
        run: npm test
        working-directory: service-favorites

      # S'executa NOMÉS si algun pas anterior ha fallat
      - name: Notificar fallida
        if: failure()
        run: echo "❌ El workflow ha fallat a service-favorites. Revisa els errors anteriors."

  test-wishlist:
