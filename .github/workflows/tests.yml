      # Verifica que la sintaxi JavaScript és vàlida (node --check)
      - name: Verificar sintaxi (build)
        run: npm run build
        working-directory: service-history

      # Analitza el codi amb ESLint per detectar problemes de qualitat
      - name: Comprovar qualitat del codi (lint)
        run: npm run lint
