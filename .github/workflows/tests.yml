      # Executa els tests automàtics amb Jest
      - name: Executar tests
        run: npm test
        working-directory: service-history

      # S'executa NOMÉS si algun pas anterior ha fallat
      - name: Notificar fallida
        if: failure()
        run: echo "❌ El workflow ha fallat a service-history. Revisa els errors anteriors."
